<!-- Start of Product  section
============================================= -->
<section id="or-product-2" class="or-product-section-2">
    <div class="container">
        <div class="or-product-content-2">
            <div class="row">
                <div class="col-lg-12">
                    <div class="or-product-content-wrapper-2">
                        <div class="or-product-top-content d-flex justify-content-between align-items-end">
                            <div class="or-section-title-2 headline">
                                <h2>Latest products</h2>
                            </div>
                            <div class="carousel_nav  clearfix">
                                <button type="button" class="or-pro2-left_arrow"><i class="far fa-chevron-left"></i></button>
                                <button type="button" class="or-pro2-right_arrow"><i class="far fa-chevron-right"></i></button>
                            </div>
                        </div>
                        <div class="or-product-item-slider-wrapper">
                            <div class="or-product-item-slider">
                                {% for prod in products %}
                                <div class="organio-inner-item">
                                    <div class="or-product-item-2 text-center">
                                        <div class="or-product-img-btn position-relative">
                                            <div class="or-product-img">
                                                <img src="{{prod.image.url}}" alt="">
                                            </div>
                                            <div class="price"> 
                                                <span class="discount-price">{{prod.price}} сом</span>
                                            </div>
                                            <div class="e-commerce-btn">
                                                <a href="index-2.html#"><i class="fal fa-shopping-cart"></i></a>
                                                <a href="index-2.html#"><i class="fal fa-heart"></i></a>
                                                <a href="index-2.html#"><i class="fal fa-eye"></i></a>
                                            </div>
                                        </div>
                                        <div class="or-product-text headline">
                                            <h3><a href="shop-single.html">{{prod.name}}</a></h3>
                                        </div>
                                    </div>
                                </div>
                                {% endfor %}
                            </div>
                        </div>
                    </div>	
                </div>
            </div>
        </div>
    </div>
</section>
<!-- End of Product  section
============================================= -->
